version: "3"

vars:
  PYTEST_ARGS: '{{.PYTEST_ARGS | default ""}}'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  install:
    desc: Install archived Python package editable with dev deps
    cmds:
      - pip install -e ".[dev]"

  test:
    desc: Run archived unit tests (pass extra args after --)
    env:
      PYTHONPATH: "{{.TASKFILE_DIR}}/src"
    cmds:
      - pytest {{.PYTEST_ARGS}} {{.CLI_ARGS}}

  mcp:
    desc: Run Python PoC (python -m xplane_mcp.poc; pass flags after --)
    env:
      PYTHONPATH: "{{.TASKFILE_DIR}}/src"
    cmds:
      - python -m xplane_mcp.poc {{.CLI_ARGS}}
